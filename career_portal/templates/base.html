<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BlueOrbit Careers</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="backdrop backdrop-one"></div>
    <div class="backdrop backdrop-two"></div>
    <div class="shell">
        <header class="topbar">
            <a href="{{ url_for('web.index') }}" class="brand">
                <span class="brand-mark"></span>
                <span class="brand-text">BlueOrbit Careers</span>
            </a>
            <a class="topbar-link" href="#board">Open roles</a>
        </header>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <section class="flash-stack">
                    {% for category, message in messages %}
                        <div class="flash flash-{{ category }}" data-flash>{{ message }}</div>
                    {% endfor %}
                </section>
            {% endif %}
        {% endwith %}

        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
    <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
</body>
</html>
